# 在线 Web IDE
# 部署目录：/root/docker-compose/code-server/docker-compose.yml

services:
  code-server:
    image: linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=1000 # 映射用户权限
      - PGID=1000 # 映射用户权限
      - TZ=America/Los_Angeles # 选择时区
      - PASSWORD # optional
      - SUDO_PASSWORD # optional
      - DEFAULT_WORKSPACE=/config/workspace # optional 默认工作路径
    volumes:
      - ./config:/config # 配置文件
    ports:
      - 8443:8443 # Web 端口
    restart: unless-stopped
